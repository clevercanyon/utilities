##
# WP docker compose file (AV variant).
#
# This does a volume adjustment for projects with a `wp-website|wp-network` layout.
# Project's directory becomes the `/var/www/html` directory for those layouts.
#
# @since 1.0.0
#
# Docker is not aware of this file's location.
# Please use the `--file` option when running `docker compose`.
#
# @note PLEASE DO NOT EDIT THIS FILE!
# This file and the contents of it are updated automatically.
#
# - Instead of editing this file, you can modify `./dev/.libs/docker/wp/compose~prj.yml`.
# - Instead of editing this file, please review source repository {@see https://o5p.me/LevQOD}.
#
# @see https://docs.docker.com/compose/extends/
##

version  : '3.9' # {@see https://o5p.me/TtD60s}.

services :

    php : # Adjust volumes.
        volumes :
            - 'php-data:/var/www'
            - '../../../../:/var/www/html:ro'
            - '../../../../:/wp-docker/host/project:ro'
            - '../../../../wp-admin:/var/www/html/wp-admin'
            - '../../../../wp-includes:/var/www/html/wp-includes'
            - '../../../../wp-content/uploads:/var/www/html/wp-content/uploads'
            - '../../../../wp-content/upgrade:/var/www/html/wp-content/upgrade'
            - '../../../../index.php:/var/www/html/index.php'
            - '../../../../license.txt:/var/www/html/license.txt'
            - '../../../../readme.html:/var/www/html/readme.html'
            - '../../../../wp-activate.php:/var/www/html/wp-activate.php'
            - '../../../../wp-blog-header.php:/var/www/html/wp-blog-header.php'
            - '../../../../wp-comments-post.php:/var/www/html/wp-comments-post.php'
            - '../../../../wp-cron.php:/var/www/html/wp-cron.php'
            - '../../../../wp-links-opml.php:/var/www/html/wp-links-opml.php'
            - '../../../../wp-load.php:/var/www/html/wp-load.php'
            - '../../../../wp-login.php:/var/www/html/wp-login.php'
            - '../../../../wp-mail.php:/var/www/html/wp-mail.php'
            - '../../../../wp-settings.php:/var/www/html/wp-settings.php'
            - '../../../../wp-signup.php:/var/www/html/wp-signup.php'
            - '../../../../wp-trackback.php:/var/www/html/wp-trackback.php'
            - '../../../../xmlrpc.php:/var/www/html/xmlrpc.php'
